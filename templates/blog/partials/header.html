<form action="{% url 'post:search_post' %}" method="get">
    <input type="text" name="query" required placeholder="دنبال چیزی هستی بنویس؟">
    <input type="submit" value="جستجو">
</form>
<br>
{% if request.user.is_authenticated %}
<h4><a href="{% url 'post:profile' %}">{{ request.user.first_name|default:request.user.username }}</a></h4>
{% else %}
<h4><a href="{% url 'post:login' %}">ورود</a></h4>
{% endif %}
